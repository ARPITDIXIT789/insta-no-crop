name: Build and Push to DockerHub

# Trigger: jab bhi main branch pe code push ho
on:
  push:
    branches:
      - main
  # Manual trigger option (testing ke liye useful)
  workflow_dispatch:

# Prevent concurrent runs — agar pehla run chal raha hai to naya wait karega
concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Repo checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Docker Buildx setup (multi-platform builds ke liye)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ DockerHub pe login (secrets se credentials)
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4️⃣ Backend image build + push (multi-arch: amd64 + arm64)
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            arpitdixit78/insta-backend:latest
            arpitdixit78/insta-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5️⃣ Frontend image build + push (multi-arch)
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            arpitdixit78/insta-frontend:latest
            arpitdixit78/insta-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6️⃣ Summary print
      - name: Image push summary
        run: |
          echo "✅ Backend image pushed: arpitdixit78/insta-backend:latest"
          echo "✅ Frontend image pushed: arpitdixit78/insta-frontend:latest"
          echo "📌 Commit SHA tag: ${{ github.sha }}"
          echo "🔗 DockerHub: https://hub.docker.com/u/arpitdixit78"
