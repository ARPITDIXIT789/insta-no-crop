server {
    listen 80;
    server_name instanocrop.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name instanocrop.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/instanocrop.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/instanocrop.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location /convert {
        proxy_pass http://backend:8000/convert;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        client_max_body_size 20M;
    }

    # Make sure PWA files update quickly
    location = /service-worker.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
